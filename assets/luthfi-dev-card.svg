<svg width="900" height="420" viewBox="0 0 900 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0F172A"/>
      <stop offset="0.45" stop-color="#111827"/>
      <stop offset="1" stop-color="#052E2B"/>
    </linearGradient>
    <linearGradient id="accent" x1="130" y1="40" x2="760" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38BDF8"/>
      <stop offset="0.5" stop-color="#22C55E"/>
      <stop offset="1" stop-color="#F97316"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.13 0 0 0 0 0.77 0 0 0 0 0.55 0 0 0 0.55 0"/>
      <feBlend in="SourceGraphic"/>
    </filter>
    <style>
      .mono { font-family: Consolas, Monaco, 'Courier New', monospace; }
      .sans { font-family: Inter, Segoe UI, Arial, sans-serif; }
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }
      @keyframes blink {
        0%, 45% { opacity: 1; }
        46%, 100% { opacity: 0.15; }
      }
      @keyframes dash {
        to { stroke-dashoffset: -260; }
      }
      @keyframes pulse {
        0%, 100% { opacity: .45; }
        50% { opacity: 1; }
      }
      .float { animation: float 4s ease-in-out infinite; transform-origin: center; }
      .blink { animation: blink 1.1s steps(1) infinite; }
      .dash { stroke-dasharray: 14 18; animation: dash 7s linear infinite; }
      .pulse { animation: pulse 2.4s ease-in-out infinite; }
    </style>
  </defs>

  <rect width="900" height="420" rx="28" fill="url(#bg)"/>
  <path class="dash" d="M72 326 C170 230 236 350 348 254 C458 160 558 274 660 164 C720 98 786 104 842 72" stroke="url(#accent)" stroke-width="3" opacity="0.65"/>
  <circle class="pulse" cx="118" cy="96" r="70" fill="#0EA5E9" opacity="0.12"/>
  <circle class="pulse" cx="784" cy="326" r="88" fill="#22C55E" opacity="0.12"/>
  <circle cx="716" cy="88" r="6" fill="#F97316"/>
  <circle cx="742" cy="88" r="6" fill="#22C55E"/>
  <circle cx="768" cy="88" r="6" fill="#38BDF8"/>

  <g class="float">
    <rect x="84" y="72" width="374" height="248" rx="18" fill="#020617" stroke="#334155"/>
    <rect x="84" y="72" width="374" height="44" rx="18" fill="#111827"/>
    <circle cx="116" cy="94" r="6" fill="#EF4444"/>
    <circle cx="138" cy="94" r="6" fill="#F59E0B"/>
    <circle cx="160" cy="94" r="6" fill="#22C55E"/>
    <text x="108" y="154" class="mono" font-size="18" fill="#38BDF8">const</text>
    <text x="170" y="154" class="mono" font-size="18" fill="#E5E7EB">developer</text>
    <text x="278" y="154" class="mono" font-size="18" fill="#94A3B8">=</text>
    <text x="304" y="154" class="mono" font-size="18" fill="#F97316">{</text>
    <text x="128" y="190" class="mono" font-size="18" fill="#22C55E">name:</text>
    <text x="198" y="190" class="mono" font-size="18" fill="#FDE68A">"Luthfi"</text>
    <text x="128" y="226" class="mono" font-size="18" fill="#22C55E">stack:</text>
    <text x="198" y="226" class="mono" font-size="18" fill="#FDE68A">"Frontend"</text>
    <text x="128" y="262" class="mono" font-size="18" fill="#22C55E">mode:</text>
    <text x="198" y="262" class="mono" font-size="18" fill="#FDE68A">"Building"</text>
    <text x="108" y="298" class="mono" font-size="18" fill="#F97316">}</text>
    <rect class="blink" x="132" y="303" width="72" height="3" rx="2" fill="#38BDF8"/>
  </g>

  <g>
    <rect x="518" y="106" width="286" height="222" rx="22" fill="#0B1220" stroke="#334155"/>
    <rect x="548" y="136" width="226" height="18" rx="9" fill="#1E293B"/>
    <rect x="548" y="136" width="158" height="18" rx="9" fill="#22C55E"/>
    <text x="548" y="198" class="sans" font-size="34" font-weight="800" fill="#F8FAFC">itzluthfi</text>
    <text x="548" y="230" class="sans" font-size="18" fill="#94A3B8">web interfaces, clean UI, creative code</text>
    <g filter="url(#glow)">
      <rect x="548" y="268" width="64" height="36" rx="10" fill="#0EA5E9"/>
      <rect x="626" y="268" width="64" height="36" rx="10" fill="#22C55E"/>
      <rect x="704" y="268" width="64" height="36" rx="10" fill="#F97316"/>
    </g>
  </g>
</svg>
